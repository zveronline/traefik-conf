http:
  # Add the router
  routers:
    openwrt:
      entryPoints:
        - websecure
      service: openwrt
      rule: "Host(`vps-ihor-2.z-network.ru`)"
      middlewares:
        - gzip@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "z-network.ru"
            sans:
              - "*.z-network.ru"
              
  # Add the service
  services:
    openwrt:
      loadBalancer:
        servers:
        - url: http://10.22.0.1:9092
        passHostHeader: true