http:
  # Add the router
  routers:
    znetwork:
      entryPoints:
        - websecure
      service: traefik-1
      rule: "HostRegexp(`[a-z]+\\.z-network\\.ru`)"
      priority: 1
      middlewares:
        - gzip@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "z-network.ru"
            sans:
              - "*.z-network.ru"
    znetwork-4:
      entryPoints:
        - websecure
      service: traefik-4
      rule: "Host(`vscode.z-network.ru`) || Host(`torrserv.z-network.ru`)"
      middlewares:
        - gzip@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "z-network.ru"
            sans:
              - "*.z-network.ru"
    zveronline:
      entryPoints:
        - websecure
      service: traefik-1
      rule: "HostRegexp(`[a-z]+\\.zveronline\\.ru`)"
      priority: 1
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "zveronline.ru"
            sans:
              - "*.zveronline.ru"
    zveronline-4:
      entryPoints:
        - websecure
      service: traefik-4
      rule: "Host(`file.zveronline.ru`) || Host(`gpt.zveronline.ru`) || Host(`jelly.zveronline.ru`) || Host(`kiwix.zveronline.ru`) || Host(`peertube.zveronline.ru`) || Host(`tube.zveronline.ru`) || Host(`book.zveronline.ru`) || Host(`kosync.zveronline.ru`) || Host(`kavita.zveronline.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "zveronline.ru"
            sans:
              - "*.zveronline.ru"
    wordpress:
      entryPoints:
        - websecure
      service: traefik-1
      rule: "Host(`zveronline.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "zveronline.ru"
            sans:
              - "*.zveronline.ru"
    wordpress-astro:
      entryPoints:
        - websecure
      service: traefik-1
      rule: "Host(`astro-kirov.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "astro-kirov.ru"
            sans:
              - "*.astro-kirov.ru"
    tonargorn:
      entryPoints:
        - websecure
      service: traefik-1
      rule: "Host(`tonargorn.ru`) || Host(`www.tonargorn.ru`) || Host(`auth.tonargorn.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "tonargorn.ru"
            sans:
              - "*.tonargorn.ru"
    znetwork-kuber:
      entryPoints:
        - websecure
      service: traefik-kuber
      rule: "Host(`traefik.z-network.ru`) || Host(`rancher.z-network.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "z-network.ru"
            sans:
              - "*.z-network.ru"
    vm-docker-1-http:
      entryPoints:
        - web
      service: traefik-1-http
      rule: "Host(`lampac.zveronline.ru`) || Host(`lampa.zveronline.ru`)"
      priority: 2000
      middlewares:
        - gzip@file
        - my-geoblock@file
    ordinary:
      entryPoints:
        - websecure
      service: traefik-4
      rule: "Host(`ordinary-minecraft.ru`) || Host(`www.ordinary-minecraft.ru`) || Host(`old.ordinary-minecraft.ru`) || Host(`wiki.ordinary-minecraft.ru`) || Host(`radio.ordinary-minecraft.ru`) || Host(`legacy.ordinary-minecraft.ru`) || Host(`genesis.ordinary-minecraft.ru`) || Host(`bans.ordinary-minecraft.ru`) || Host(`inferno.ordinary-minecraft.ru`) || Host(`portal.ordinary-minecraft.ru`) || Host(`video.ordinary-minecraft.ru`) || Host(`sessionserver.ordinary-minecraft.ru`)"
      middlewares:
        - gzip@file
        - my-geoblock@file
        - block-bad-ip@file
#        - simple_ratelimit@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "ordinary-minecraft.ru"
            sans:
              - "*.ordinary-minecraft.ru"
    ordinary-http:
      entryPoints:
        - web
      service: traefik-4-http
      rule: "Host(`sessionserver.ordinary-minecraft.ru`)"
      priority: 2000
      middlewares:
        - gzip@file
        - my-geoblock@file

  # Add the service
  services:
    traefik-1:
      loadBalancer:
        servers:
        - url: https://10.3.1.12:443
#          - url: https://85.93.42.67:443
        passHostHeader: true
    traefik-1-http:
      loadBalancer:
        servers:
        - url: http://10.3.1.12:80
        passHostHeader: true
    traefik-kuber:
      loadBalancer:
        servers:
        - url: https://10.3.3.3:443
        passHostHeader: true
    traefik-4:
      loadBalancer:
        servers:
        - url: https://10.3.1.3:443
        passHostHeader: true
    traefik-4-http:
      loadBalancer:
        servers:
        - url: http://10.3.1.3:80
        passHostHeader: true