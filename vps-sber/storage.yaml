http:
  # Add the router
  routers:
    sto2:
      entryPoints:
        - synology
      service: sto2
      rule: "Host(`sto2.z-network.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "z-network.ru"
            sans:
              - "*.z-network.ru"
    sto2-443:
      entryPoints:
        - websecure
      service: sto2-443
      rule: "Host(`sto2.z-network.ru`)"
      middlewares:
        - default@file
      tls:
        certResolver: cloudflare
        domains:
          - main: "z-network.ru"
            sans:
              - "*.z-network.ru"

  # Add the service
  services:
    sto2:
      loadBalancer:
        servers:
          - url: https://10.5.0.100:5001
        passHostHeader: true
    sto2-443:
      loadBalancer:
        servers:
          - url: https://10.5.0.100
        passHostHeader: true