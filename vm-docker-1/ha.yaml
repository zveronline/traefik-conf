http:
  # Add the router
  routers:
    ha:
      entryPoints:
        - websecure
      service: ha
      rule: "Host(`ha.z-network.ru`)"
      middlewares:
        - gzip@file
      tls:

  # Add the service
  services:
    ha:
      loadBalancer:
        servers:
        - url: http://10.3.1.5:8123/
        passHostHeader: true