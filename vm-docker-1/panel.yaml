http:
  # Add the router
  routers:
    linstor-gw:
      entryPoints:
        - websecure
      service: linstor-gw
      rule: "Host(`linstor-gw.z-network.ru`)"
      middlewares:
        - gzip@file
      tls:

    linstor:
      entryPoints:
        - websecure
      service: linstor
      rule: "Host(`linstor.z-network.ru`)"
      middlewares:
        - gzip@file
      tls:

    openwrt:
      entryPoints:
        - websecure
      service: openwrt
      rule: "Host(`gw.z-network.ru`)"
      middlewares:
        - gzip@file
      tls:


  # Add the service
  services:
    linstor-gw:
      loadBalancer:
        servers:
        - url: http://10.3.0.4:8080/
        passHostHeader: true
    linstor:
      loadBalancer:
        servers:
        - url: http://10.3.0.4:3370/
        passHostHeader: true
    openwrt:
      loadBalancer:
        servers:
        - url: http://10.3.0.1:80/
        passHostHeader: true